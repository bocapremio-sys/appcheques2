# Banco de dados: Supabase (externo, cloud)
# Não há container de banco — as credenciais ficam no .env
# Proxy reverso gerenciado pelo Easypanel (Traefik) — nginx removido

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    restart: unless-stopped
    ports:
      - "80:80"
